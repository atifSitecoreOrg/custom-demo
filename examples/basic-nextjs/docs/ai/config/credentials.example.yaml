# Demo builder credentials — EXAMPLE FILE
#
# Copy this file to credentials.local.yaml and fill in your values:
#   cp docs/ai/config/credentials.example.yaml docs/ai/config/credentials.local.yaml
#
# credentials.local.yaml is gitignored and will never be committed.
# The agent reads it during Phase 0 of every demo build.
# If the file doesn't exist, the agent will ask for these values and create it.

# Sitecore Content Hub (for automated image upload, approval, and public link creation)
contentHub:
  host: "https://ffde.sitecoresandbox.cloud/"
  authMethod: "simple"        # "simple" (user+password) | "oauth" (user+password+clientId+secret)
  user: "sitecore"
  password: "Sitecore123!@"
  clientId: ""                # only for authMethod: oauth
  clientSecret: ""            # only for authMethod: oauth
  token: ""                   # only for authMethod: token (pre-existing bearer token)
  uploadConfig: "AssetUploadConfiguration"
